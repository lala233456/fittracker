name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ========== 拉取代码 ==========
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== Node.js ==========
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ========== 安装依赖 ==========
      - name: Install dependencies
        run: npm ci

      # ========== 准备 Web 资源到 www/ ==========
      - name: Prepare web assets
        run: |
          rm -rf www
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp icon.svg www/
          cp icon-512.png www/
          cp -r css www/
          cp -r js www/

      # ========== 初始化/同步 Capacitor Android ==========
      - name: Init & Sync Capacitor Android
        run: |
          npx cap add android || true
          npx cap sync android

      # ========== 复制自定义插件 ==========
      - name: Copy custom FolderPicker plugin
        run: |
          mkdir -p android/app/src/main/java/com/fittracker/app/folderpicker
          cp plugins/folder-picker/android/src/main/java/com/fittracker/app/folderpicker/FolderPickerPlugin.java \
             android/app/src/main/java/com/fittracker/app/folderpicker/FolderPickerPlugin.java

      # ========== 注册插件到 MainActivity ==========
      - name: Register plugin in MainActivity
        run: |
          MAIN=android/app/src/main/java/com/fittracker/app/MainActivity.java
          if ! grep -q "FolderPickerPlugin" "$MAIN"; then
            sed -i 's/import com.getcapacitor.BridgeActivity;/import com.getcapacitor.BridgeActivity;\nimport com.fittracker.app.folderpicker.FolderPickerPlugin;/' "$MAIN"
            sed -i 's/add(.*);$/add(com.fittracker.app.folderpicker.FolderPickerPlugin.class);\n\0/' "$MAIN"
          fi
          cat "$MAIN"

      # ========== 设置构建环境（JDK + SDK）==========
      - name: Setup JDK 17 (for Android Gradle Plugin)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses + install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # ========== 修复 Java 版本兼容性 ==========
      - name: Fix Java compatibility
        working-directory: android
        run: |
          # capacitor.build.gradle 可能要求 VERSION_21，改为 VERSION_17 以匹配我们的 JDK
          find . -name "*.gradle" | xargs grep -l "VERSION_21" 2>/dev/null | while read f; do
            echo "Fixing $f: VERSION_21 -> VERSION_17"
            sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' "$f"
          done
          # 确认修改
          grep -rn "sourceCompatibility\|targetCompatibility" app/capacitor.build.gradle || echo "No source/target compat found"

      # ========== Gradle 构建 ==========
      - name: Build APK (debug)
        working-directory: android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          JAVA_HOME: ${{ java.home }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode=all

      # ========== 上传 Artifact ==========
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitTracker-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      # ========== 创建 Release ==========
      - name: Create tag and push
        run: |
          TAG="v1.0.${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Auto build $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: 'FitTracker v1.0.${{ github.run_number }}'
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            🏋️ FitTracker 健身记录应用

            ## 功能
            - 每日训练计划创建与打卡
            - 多强度分组支持
            - 历史记录查看
            - 日/月/年统计看板
            - 数据导出/导入备份
            - 原生文件夹选择器

            ## 安装说明
            1. 下载 app-debug.apk
            2. 在 Android 手机上安装
            3. 如提示"未知来源"，需在设置中允许安装
