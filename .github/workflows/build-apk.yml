name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  JAVA_HOME: ${{ steps.setup-java.outputs.path }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== Java 21（Capacitor 要求）==========
      - name: Setup JDK 21
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ========== Android SDK ==========
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      # ========== Node.js ==========
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # ========== 准备 Web 资源到 www/ ==========
      - name: Prepare web assets
        run: |
          rm -rf www
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp icon.svg www/
          cp icon-512.png www/
          cp -r css www/
          cp -r js www/

      # ========== 同步 Capacitor ==========
      - name: Sync Capacitor
        run: npx cap sync android

      # ========== 复制自定义插件 ==========
      - name: Copy custom plugin
        run: |
          mkdir -p android/app/src/main/java/com/fittracker/app/folderpicker
          cp plugins/folder-picker/android/src/main/java/com/fittracker/app/folderpicker/FolderPickerPlugin.java \
             android/app/src/main/java/com/fittracker/app/folderpicker/FolderPickerPlugin.java

      # ========== 修复 SDK 版本兼容性 ==========
      - name: Fix SDK versions for CI
        run: |
          # 将 compileSdk 和 targetSdk 改为 35（CI 环境可用）
          sed -i 's/compileSdkVersion = 36/compileSdkVersion = 35/' android/variables.gradle
          sed -i 's/targetSdkVersion = 36/targetSdkVersion = 35/' android/variables.gradle
          cat android/variables.gradle

      # ========== Gradle 构建 ==========
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ========== 上传 Artifact ==========
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitTracker-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ========== 创建 Release ==========
      - name: Create tag and push
        run: |
          TAG="v1.0.${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Auto build $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: 'FitTracker v1.0.${{ github.run_number }}'
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            🏋️ FitTracker 健身记录应用

            ## 功能
            - 每日训练计划创建与打卡
            - 多强度分组支持
            - 历史记录查看
            - 日/月/年统计看板
            - 数据导出/导入备份
            - 原生文件夹选择器

            ## 安装说明
            1. 下载 app-debug.apk
            2. 在 Android 手机上安装
            3. 如提示"未知来源"，需在设置中允许安装
