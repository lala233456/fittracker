name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Prepare web assets
        run: |
          rm -rf www
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp icon.svg www/
          cp icon-512.png www/
          cp -r css www/
          cp -r js www/

      - name: Init & Sync Capacitor Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Copy custom FolderPicker plugin
        run: |
          mkdir -p android/app/src/main/java/com/fittracker/app/folderpicker
          cp plugins/folder-picker/android/src/main/java/com/fittracker/app/folderpicker/FolderPickerPlugin.java \
             android/app/src/main/java/com/fittracker/app/folderpicker/FolderPickerPlugin.java

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null

      - name: Build APK (debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode=all

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitTracker-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Create tag and push
        run: |
          TAG="v1.0.${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Auto build $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: 'FitTracker v1.0.${{ github.run_number }}'
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            🏋️ FitTracker 健身记录应用

            ## 功能
            - 每日训练计划创建与打卡
            - 多强度分组支持
            - 历史记录查看
            - 日/月/年统计看板
            - 数据导出/导入备份
            - 原生文件夹选择器

            ## 安装说明
            1. 下载 app-debug.apk
            2. 在 Android 手机上安装
            3. 如提示"未知来源"，需在设置中允许安装
